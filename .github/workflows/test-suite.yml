name: 🧪 Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: write

jobs:
  # ── 1. Testes Unitários ────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --coverage --reporter=junit --outputFile=reports/unit-results.xml

      - name: Publish unit test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests Report
          path: reports/unit-results.xml
          reporter: jest-junit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/

  # ── 2. Testes de Integração ────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
        run: npm run test:integration -- --reporter=junit --outputFile=reports/integration-results.xml

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests Report
          path: reports/integration-results.xml
          reporter: jest-junit

  # ── 3. Testes E2E ─────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ── 4. Abrir Issue automática em caso de falha no main ────────────────────
  notify-failure:
    name: Notify Test Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commit = context.sha.substring(0, 7);

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ [CI] Falha de testes na main — ${new Date().toLocaleDateString('pt-BR')} (${commit})`,
              body: `## Falha detectada no pipeline de testes\n\n**Branch:** \`main\`\n**Commit:** \`${context.sha}\`\n**Run:** [Ver detalhes](${runUrl})\n\n### Próximos passos\n- [ ] Verificar qual suite falhou no link acima\n- [ ] Criar issue de falha específica com evidências\n- [ ] Corrigir e reabrir este item ao resolver\n\n> Esta issue foi criada automaticamente pelo GitHub Actions.`,
              labels: ['test-fail', 'ci-failure']
            });

  # ── 5. Comentar resultado no PR ───────────────────────────────────────────
  pr-comment:
    name: PR Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const unit        = '${{ needs.unit-tests.result }}';
            const integration = '${{ needs.integration-tests.result }}';
            const e2e         = '${{ needs.e2e-tests.result }}';

            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : '⚠️';
            const allPassed = [unit, integration, e2e].every(r => r === 'success');

            const body = [
              `## ${allPassed ? '✅ Todos os testes passaram' : '❌ Falha nos testes'}`,
              '',
              '| Suite | Status |',
              '|-------|--------|',
              `| Unitários    | ${icon(unit)} ${unit} |`,
              `| Integração   | ${icon(integration)} ${integration} |`,
              `| E2E          | ${icon(e2e)} ${e2e} |`,
              '',
              `[Ver detalhes do run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
